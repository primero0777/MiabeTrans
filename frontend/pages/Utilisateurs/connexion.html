<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" id="global_csrf_token">
    <title>Connexion - MiabeTrans</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Header -->
        <header class="auth-header">
            <a href="../../pages/Accueil/index.html" class="logo-link">
                <div class="auth-logo">
                    <span class="brand-name">MiabeTrans</span>
                </div>
            </a>
            <h1 class="auth-title">Connectez-vous à votre compte</h1>
            <p class="auth-subtitle">Accédez à vos réservations et profitez de nos services</p>
        </header>

        <!-- Formulaire de connexion -->
        <main class="auth-main">
            <form id="loginForm" class="auth-form" novalidate>
                <input type="hidden" name="csrf_token" id="csrf_token">
                <div class="form-group">
                    <label for="email" class="form-label">Adresse email</label>
                    <input type="email" id="email" name="email" 
                           class="form-input" required
                           placeholder="votre@email.com"
                           aria-describedby="email-error">
                    <div id="email-error" class="error-message" aria-live="polite"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" id="password" name="password" 
                           class="form-input" required
                           placeholder="Votre mot de passe"
                           aria-describedby="password-error">
                    <div id="password-error" class="error-message" aria-live="polite"></div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span class="checkmark"></span>
                        Se souvenir de moi
                    </label>
                    <a href="mot-de-passe-oublie.html" class="forgot-password">
                        Mot de passe oublié?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary btn-auth">
                    <span class="btn-text">Se connecter</span>
                    <span class="btn-loading" aria-hidden="true"></span>
                </button>
            </form>

            <div class="auth-divider">
                <span>Ou</span>
            </div>

            <div class="auth-footer">
                <p>Nouveau sur MiabeTrans? 
                    <a href="inscription.html" class="auth-link">Créer un compte</a>
                </p>
            </div>
        </main>

        <!-- Messages de statut -->
        <div id="authMessages" class="auth-messages" aria-live="polite"></div>
    </div>

    <script src="../../js/auth.js"></script>
    <script>
        // Charger le token CSRF au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            fetch('../../api/auth/csrf.php')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('csrf_token').value = data.token;
                    document.getElementById('global_csrf_token').content = data.token;
                });
        });
    </script>
</body>
</html>
