<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - MiabeTrans</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Header -->
        <header class="auth-header">
            <a href="../../pages/Accueil/index.html" class="logo-link">
                <div class="auth-logo">
                    <span class="brand-name">MiabeTrans</span>
                </div>
            </a>
            <h1 class="auth-title">Créez votre compte</h1>
            <p class="auth-subtitle">Rejoignez la communauté MiabeTrans et voyagez en toute sérénité</p>
        </header>

        <!-- Formulaire d'inscription -->
        <main class="auth-main">
            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prenom" class="form-label">Prénom *</label>
                        <input type="text" id="prenom" name="prenom" 
                               class="form-input" required
                               placeholder="Votre prénom"
                               aria-describedby="prenom-error">
                        <div id="prenom-error" class="error-message" aria-live="polite"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="nom" class="form-label">Nom *</label>
                        <input type="text" id="nom" name="nom" 
                               class="form-input" required
                               placeholder="Votre nom"
                               aria-describedby="nom-error">
                        <div id="nom-error" class="error-message" aria-live="polite"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Adresse email *</label>
                    <input type="email" id="email" name="email" 
                           class="form-input" required
                           placeholder="votre@email.com"
                           aria-describedby="email-error">
                    <div id="email-error" class="error-message" aria-live="polite"></div>
                </div>

                <div class="form-group">
                    <label for="telephone" class="form-label">Téléphone *</label>
                    <input type="tel" id="telephone" name="telephone" 
                           class="form-input" required
                           placeholder="+228 XX XX XX XX"
                           aria-describedby="telephone-error">
                    <div id="telephone-error" class="error-message" aria-live="polite"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe *</label>
                    <input type="password" id="password" name="password" 
                           class="form-input" required
                           placeholder="Votre mot de passe"
                           minlength="6"
                           aria-describedby="password-error">
                    <div id="password-error" class="error-message" aria-live="polite"></div>
                    <div class="form-help">
                        Minimum 6 caractères
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirmer le mot de passe *</label>
                    <input type="password" id="confirm_password" name="confirm_password" 
                           class="form-input" required
                           placeholder="Confirmez votre mot de passe"
                           aria-describedby="confirm-password-error">
                    <div id="confirm-password-error" class="error-message" aria-live="polite"></div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="newsletter" id="newsletter" checked>
                        <span class="checkmark"></span>
                        Recevoir les offres spéciales et actualités MiabeTrans
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" id="terms" required>
                        <span class="checkmark"></span>
                        J'accepte les <a href="../Aide/conditions-utilisation.html" target="_blank">conditions d'utilisation</a> 
                        et la <a href="../Aide/politique-confidentialite.html" target="_blank">politique de confidentialité</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-auth">
                    <span class="btn-text">Créer mon compte</span>
                    <span class="btn-loading" aria-hidden="true"></span>
                </button>
            </form>

            <div class="auth-divider">
                <span>Ou</span>
            </div>

            <div class="auth-footer">
                <p>Déjà un compte? 
                    <a href="connexion.html" class="auth-link">Se connecter</a>
                </p>
            </div>
        </main>

        <!-- Messages de statut -->
        <div id="authMessages" class="auth-messages" aria-live="polite"></div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/inscription.js"></script>
</body>
</html>
